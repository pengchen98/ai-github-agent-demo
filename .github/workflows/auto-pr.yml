name: Auto PR from development to main

on:
  push:
    branches: [ development ]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-development-to-main
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  create_pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 1) 跑你的质量门禁：单测/静态检查/安全扫描
      - name: Run tests
        run: |
          echo "Run unit tests here"
          # e.g. npm test / pytest / mvn test ...
          # 如果失败直接退出，后续不会创建 PR

      # 2) (可选) 让 AI 生成 PR 标题/描述（只生成文本）
      - name: Generate PR title/body with Azure OpenAI
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          python3 .github/scripts/gen_pr_text.py > pr_text.json

      - name: Read PR text
        id: prtext
        run: |
          TITLE=$(jq -r .title pr_text.json)
          BODY=$(jq -r .body pr_text.json)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

     
          
          - name: Create or update PR
            env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            shell: bash
            run: |
              set -euo pipefail
          
              # 查找是否已存在 development -> main 的 open PR
              existing=$(gh pr list --base main --head development --state open --json number -q '.[0].number' || true)
          
              # 把 PR body 写入文件，避免 bash 把 Markdown 里的 `...` 当命令执行
              cat > pr_body.md <<'EOF'
              **简洁标题**
              将 development 分支的文档更新和配置文件调整合入 main 分支
          
              **结构化描述**
              - **变更摘要**
                此 PR 包含以下更新：
                1. README.md 文件的内容调整，包括修复拼写错误、添加描述以及测试相关信息的补充。
                2. 更新 GitHub Actions 配置文件：
                   - `.github/workflows/ai-agent.yml` 中的轻微调整。
                   - `.github/workflows/auto-pr.yml` 中的轻微调整。
                3. 将 GitHub Actions 的 checkout action 升级至 v5。
          
              - **影响范围**
                - 文档更新对外部用户或开发者的理解可能产生轻微影响。
                - GitHub Actions 配置文件的调整可能影响 CI/CD 流程的行为。
          
              - **风险点**
                - GitHub Actions checkout action 升级至 v5 可能引入兼容性问题，需验证是否与现有工作流兼容。
                - 配置文件的修改可能导致 CI/CD 流程异常，需确保工作流运行正常。
          
              - **回滚方案**
                - 若发现问题，可回滚至合并前的 main 分支版本，并重新审查配置文件和文档更新内容。
          
              - **需要重点 review 的文件**
                1. `.github/workflows/ai-agent.yml`
                2. `.github/workflows/auto-pr.yml`
                3. `README.md`
              EOF
          
              if [[ -n "${existing:-}" ]]; then
                echo "PR already exists: #$existing, updating title/body..."
                gh pr edit "$existing" \
                  --title "Auto PR: development -> main" \
                  --body-file pr_body.md
              else
                echo "Creating new PR..."
                gh pr create \
                  --base main \
                  --head development \
                  --title "Auto PR: development -> main" \
                  --body-file pr_body.md
              fi
